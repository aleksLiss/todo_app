spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      acks: 1
      spring:
        json:
          add:
            type:
              headers: false
    topic-name: "EMAIL_SENDING_TASKS"
    partitions-count: ${KAFKA_PARTITIONS_COUNT}
    replication-count: ${KAFKA_REPLICATIONS_COUNT}
  application:
    name: todo_app
  datasource:
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    url: ${POSTGRES_URL}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    ignore-migration-patterns: "*:*"
app:
  jwt:
    config:
      lifetime-token: ${LIFETIME_TOKEN}
      secret-key: ${SECRET_KEY}