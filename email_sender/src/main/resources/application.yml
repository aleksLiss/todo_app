spring:
  mail:
    protocol: smtp
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    from: ${SMTP_EMAIL_FROM}
    properties:
      mail:
        smtp:
          auth: true
        starttls:
          enable: true
  application:
    name: "email_sender"
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    topic-name: ${KAFKA_TOPIC_NAME}
    partitions-count: 3
    replication-count: 1
    consumer:
      auto-offset-reset: earliest
      key-deserializer: ${KAFKA_KEY_DESERIALIZER}
      value-deserializer: ${KAFKA_VALUE_DESERIALIZER}
      group-id: ${KAFKA_GROUP_ID}